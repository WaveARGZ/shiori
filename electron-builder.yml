appId: com.shiori.browser
productName: Shiori
copyright: Shiori

directories:
  output: dist
  buildResources: build

# No native modules by design (electron-store is pure JS), so skip the rebuild step.
npmRebuild: false

# Smaller downloads at the cost of a slower (CI-only) build.
compression: maximum

files:
  - dist-electron/**/*
  - package.json
  - "!**/*.map"
  # Dev/test-only entry points, loaded dynamically behind SHIORI_SMOKE/SHIORI_SHOT.
  - "!dist-electron/main/smoke.js"
  - "!dist-electron/main/shot.js"

# CI (tag push) uploads every artifact to one draft GitHub release; the draft
# is published by hand once both the mac and win jobs have finished.
publish:
  provider: github
  owner: WaveARGZ
  repo: shiori
  releaseType: draft

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  # Unsigned build: no Developer ID identity, no notarization.
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  darkModeSupport: true
  extendInfo:
    NSHumanReadableCopyright: Shiori

dmg:
  sign: false
  title: Shiori ${version}
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications

win:
  # electron-builder generates the multi-size .ico from build/icon.png (1024px).
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}-x64.${ext}

portable:
  artifactName: ${productName}-Portable-${version}-x64.${ext}

linux:
  # electron-builder derives the required icon sizes from build/icon.png.
  icon: build/icon.png
  category: Network
  synopsis: 読みかけを、置いたところから。
  # The .deb target requires a Debian maintainer; package.json's author has no
  # email, so set it here (a GitHub noreply address avoids exposing a personal
  # one).
  maintainer: WaveARGZ <WaveARGZ@users.noreply.github.com>
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

appImage:
  artifactName: ${productName}-${version}-x86_64.${ext}

deb:
  artifactName: ${productName}-${version}-amd64.${ext}
